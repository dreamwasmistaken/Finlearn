<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alex Ventures</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0a0a0a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      background: rgba(0,0,0,0.8);
      position: fixed;
      width: 100%;
    }

    header h1 {
      color: #00f0ff;
    }

    nav a {
      margin-left: 20px;
      color: white;
      text-decoration: none;
    }

    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    .hero h2 {
      font-size: 50px;
      margin-bottom: 20px;
    }

    .hero button {
      padding: 12px 25px;
      border: none;
      background: #00f0ff;
      color: black;
      cursor: pointer;
      font-size: 16px;
    }

    .section {
      padding: 100px 50px;
      text-align: center;
    }

    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
    }

    footer {
      padding: 30px;
      text-align: center;
      background: #000;
    }
  </style>
</head>

<body>

<header>
  <h1>Alex Ventures</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>We Help Businesses Grow 🚀</h2>
  <p>Marketing. Websites. Revenue.</p>
  <button>Get Started</button>
</section>

<section class="section">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">Marketing Strategy</div>
    <div class="card">Website Development</div>
    <div class="card">Business Growth</div>
  </div>
</section>

<section class="section">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section>

<footer>
  <p>© 2026 Alex Ventures</p>
</footer>

</body>
</html>
